<!DOCTYPE html>
<html>

<head>
    <title>EBS Volumes</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>CostGuard</h2>

        <ul class="sidebar-menu">

            <li data-page="index.html">
                <span class="material-icons">dashboard</span>
                <span>DASHBOARD</span>
            </li>

            <li data-page="ec2.html">
                <span class="material-icons">dns</span>
                <span>EC2</span>
            </li>

            <li data-page="ebs.html">
                <span class="material-icons">storage</span>
                <span>EBS</span>
            </li>

            <li data-page="s3.html">
                <span class="material-icons">folder</span>
                <span>S3</span>
            </li>

            <li data-page="rds.html">
                <span class="material-icons">storage</span>
                <span>RDS</span>
            </li>

            <li data-page="elb.html">
                <span class="material-icons">hub</span>
                <span>ELB</span>
            </li>

            <li data-page="asg.html">
                <span class="material-icons">sync_alt</span>
                <span>ASG</span>
            </li>

        </ul>

        <div class="theme-toggle-container">
            <button id="themeToggle">Dark Mode</button>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main-content">

        <h1>EBS VOLUMES</h1>

        <!-- SUMMARY -->
        <div class="summary-container">

            <div class="summary-card">
                <h3>Total Volumes</h3>
                <p id="totalVolumes">-</p>
            </div>

            <div class="summary-card">
                <h3>In Use</h3>
                <p id="inUseVolumes">-</p>
            </div>

            <div class="summary-card">
                <h3>Available</h3>
                <p id="availableVolumes">-</p>
            </div>

            <div class="summary-card">
                <h3>Total Cost</h3>
                <p id="ebsCost">-</p>
            </div>

        </div>

        <!-- TABLE -->
        <div class="card">

            <table id="ebsTable">
                <thead>
                <tr>
                    <th>VOLUME ID</th>
                    <th>TYPE</th>
                    <th>STATE</th>
                    <th>SIZE (GB)</th>
                    <th>COST</th>
                    <th>RECOMMENDATION</th>
                </tr>
                </thead>

                <tbody></tbody>

            </table>

        </div>

    </div>

</div>

<script src="ebs.js"></script>

</body>
</html>
