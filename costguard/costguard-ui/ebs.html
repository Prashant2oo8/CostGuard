<!DOCTYPE html>
<html>

<head>
    <title>EBS Volumes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>CostGuard</h2>

        <ul class="sidebar-menu">
            <li data-page="index.html">DASHBOARD</li>
            <li data-page="ec2.html">EC2</li>
            <li data-page="ebs.html">EBS</li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main-content">

        <h1>EBS VOLUMES</h1>

        <!-- SUMMARY -->
        <div class="summary-container">

            <div class="summary-card">
                <h3>Total Volumes</h3>
                <p id="totalVolumes">-</p>
            </div>

            <div class="summary-card">
                <h3>In Use</h3>
                <p id="inUseVolumes">-</p>
            </div>

            <div class="summary-card">
                <h3>Available</h3>
                <p id="availableVolumes">-</p>
            </div>

            <div class="summary-card">
                <h3>Total Cost</h3>
                <p id="ebsCost">-</p>
            </div>

        </div>

        <!-- TABLE -->
        <div class="card">

            <table id="ebsTable">
                <thead>
                <tr>
                    <th>VOLUME ID</th>
                    <th>TYPE</th>
                    <th>STATE</th>
                    <th>SIZE (GB)</th>
                    <th>COST</th>
                    <th>RECOMMENDATION</th>
                </tr>
                </thead>

                <tbody></tbody>

            </table>

        </div>

    </div>

</div>

<script src="ebs.js"></script>

</body>
</html>
