<!DOCTYPE html>
<html>

<head>
    <title>CostGuard Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="layout">

    <div class="sidebar">

        <h2>CostGuard</h2>

        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="#">EC2 Instances</a></li>
            <li><a href="#">EBS Volumes</a></li>
            <li><a href="#">S3 Buckets</a></li>
            <li><a href="#">RDS Databases</a></li>
        </ul>

    </div>


    <div class="main-content">

        <h1>Cloud Optimization Dashboard</h1>

        <!-- SUMMARY CARDS -->
        <div class="summary-container">

            <div class="summary-card cost-card">
                <h3>Current Monthly Cost</h3>
                <p id="currentCost">Loading...</p>
            </div>

            <div class="summary-card savings-card">
                <h3>Potential Savings</h3>
                <p id="savings">Loading...</p>
            </div>

            <div class="summary-card optimized-card">
                <h3>Optimized Cost</h3>
                <p id="optimizedCost">Loading...</p>
            </div>

        </div>

        <!-- CHART -->
        <div class="card">
            <h2>Service Cost Breakdown</h2>
            <div class="chart-container">
                <canvas id="costChart"></canvas>
            </div>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
