<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CostGuard Dashboard</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>CostGuard</h2>

        <ul class="menu">
            <li class="active">Dashboard</li>
            <li>EC2</li>
            <li>EBS</li>
            <li>S3</li>
            <li>RDS</li>
            <li>ELB</li>
            <li>ASG</li>
        </ul>

        <!-- DARK MODE BUTTON -->
        <div class="theme-toggle">
            <button id="themeBtn">Dark Mode</button>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- CARDS -->
        <div class="cards">
            <div class="card">
                <h3>Current Cost</h3>
                <p id="currentCost">--</p>
            </div>

            <div class="card">
                <h3>Savings</h3>
                <p id="savings">--</p>
            </div>

            <div class="card">
                <h3>Savings %</h3>
                <p id="savingsPercent">--</p>
            </div>
        </div>

        <!-- CHARTS -->
        <div class="charts">
            <div class="chart-box">
                <h3>Service Cost Breakdown</h3>
                <canvas id="costChart"></canvas>
            </div>

            <div class="chart-box">
                <h3>Cost Comparison</h3>
                <canvas id="compareChart"></canvas>
            </div>
        </div>

        <!-- RECOMMENDATIONS -->
        <div class="section">
            <h3>Insights</h3>
            <div id="insights"></div>

            <h3>Top Expensive</h3>
            <div id="expensive"></div>

            <h3>Top Wasteful</h3>
            <div id="wasteful"></div>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
